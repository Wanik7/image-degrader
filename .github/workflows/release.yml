name: Release

on:
  push:
    tags: 
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Binary
        run: |
          mkdir -p dist
            GOOS=linux GOARCH=amd64 go build -o dist/image-degrader-linux-amd64 ./main.go
            GOOS=windows GOARCH=amd64 go build -o dist/image-degrader-windows-amd64.exe ./main.go
            GOOS=darwin GOARCH=amd64 go build -o dist/image-degrader-darwin-amd64 ./main.go

      - name: Create Github Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
